<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fassel DigiNeering - Webspace</title>
    <style>
        /* Grundlegende Stilregeln für die Seite */
        body, html {
            height: 100%;
            margin: 0;
            background-color: #f9fafb; /* Hintergrundfarbe (hellgrau, passend zur App) */
            display: flex;
            justify-content: center; /* Horizontale Zentrierung */
            align-items: center; /* Vertikale Zentrierung */
            overflow: hidden; /* Verhindert Scrollbalken */
        }

        /* Stilregeln für das Logo */
        .logo {
            max-width: 80%; /* Logo skaliert auf schmalen Bildschirmen */
            height: auto; /* Behält das Seitenverhältnis bei */
            display: block; /* Verhindert Abstände unter dem Bild */
        }
    </style>
</head>
<body>
    <img src="FD_Logo_wh_footer_803x200.png" alt="Fassel DigiNeering Logo" class="logo">
</body>
</html>
